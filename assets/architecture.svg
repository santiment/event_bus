<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Legend -->
  <rect x="10" y="10" width="290" height="105" rx="4" fill="white" stroke="#ccc" stroke-dasharray="4"/>
  <text x="20" y="30" font-size="12" fill="#444">1: Save event data to Event Store (ETS)</text>
  <text x="20" y="47" font-size="12" fill="#444">2: Create watcher entries (ETS)</text>
  <text x="20" y="64" font-size="12" fill="#444">3: Dispatch to subscribers (by priority)</text>
  <text x="20" y="81" font-size="12" fill="#444">t: Fetch original event data</text>
  <text x="20" y="98" font-size="12" fill="#444">t': Mark as completed or skipped</text>

  <!-- Event label -->
  <rect x="395" y="10" width="110" height="36" rx="4" fill="#e53935" filter="url(#shadow)"/>
  <text x="450" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="white">event</text>

  <!-- Arrow from event to core -->
  <line x1="450" y1="46" x2="450" y2="130" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e53935"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#888"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#43a047"/>
    </marker>
    <marker id="arrowBlack" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#333"/>
    </marker>
    <marker id="arrowRedUp" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e53935"/>
    </marker>
  </defs>

  <!-- Green background (core system) -->
  <rect x="50" y="130" width="800" height="180" rx="12" fill="#555" filter="url(#shadow)"/>
  <rect x="56" y="136" width="788" height="168" rx="10" fill="#43a047"/>

  <!-- Event Store box -->
  <rect x="80" y="175" width="190" height="80" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="175" y="210" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Event Store</text>
  <text x="175" y="232" text-anchor="middle" font-size="11" fill="#888">:eb_event_store</text>

  <!-- Event Bus Core box -->
  <rect x="320" y="155" width="260" height="120" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="450" y="192" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">Event Bus Core</text>
  <text x="450" y="214" text-anchor="middle" font-size="12" fill="#888">Task.Supervisor</text>
  <text x="450" y="232" text-anchor="middle" font-size="12" fill="#888">concurrent dispatch</text>
  <text x="450" y="258" text-anchor="middle" font-size="11" fill="#aaa">notify / notify_sync</text>

  <!-- Event Watcher box -->
  <rect x="630" y="175" width="190" height="80" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="725" y="210" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Event Watcher</text>
  <text x="725" y="232" text-anchor="middle" font-size="11" fill="#888">:eb_event_watchers</text>

  <!-- Arrow 1: Core -> Store -->
  <line x1="320" y1="215" x2="275" y2="215" stroke="white" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <rect x="286" y="220" width="22" height="18" rx="3" fill="#43a047"/>
  <text x="297" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="white">1</text>

  <!-- Arrow 2: Core -> Watcher -->
  <line x1="580" y1="215" x2="625" y2="215" stroke="white" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <rect x="590" y="220" width="22" height="18" rx="3" fill="#43a047"/>
  <text x="601" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="white">2</text>

  <!-- Subscriber boxes -->
  <!-- Subscriber 1: DB Operations -->
  <rect x="55" y="420" width="200" height="80" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="155" y="447" text-anchor="middle" font-size="11" fill="#90caf9">Event Processor</text>
  <text x="155" y="472" text-anchor="middle" font-size="18" font-weight="bold" fill="white">DB Operations</text>

  <!-- Subscriber 2: Metrics -->
  <rect x="310" y="420" width="200" height="80" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="410" y="447" text-anchor="middle" font-size="11" fill="#90caf9">Event Processor</text>
  <text x="410" y="472" text-anchor="middle" font-size="18" font-weight="bold" fill="white">Metrics</text>

  <!-- Dots -->
  <text x="555" y="470" font-size="20" fill="#999">...</text>
  <text x="585" y="470" font-size="20" fill="#999">...</text>
  <text x="615" y="470" font-size="20" fill="#999">...</text>

  <!-- Subscriber 3: Calculations -->
  <rect x="660" y="420" width="200" height="80" rx="8" fill="#1565c0" filter="url(#shadow)"/>
  <text x="760" y="447" text-anchor="middle" font-size="11" fill="#90caf9">Event Processor</text>
  <text x="760" y="472" text-anchor="middle" font-size="18" font-weight="bold" fill="white">Calculations</text>

  <!-- Arrow 3: Core -> Subscribers (green downward) -->
  <line x1="155" y1="310" x2="155" y2="415" stroke="#43a047" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="137" y="330" width="22" height="18" rx="3" fill="white" stroke="#43a047"/>
  <text x="148" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="#43a047">3</text>

  <line x1="410" y1="310" x2="410" y2="415" stroke="#43a047" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="392" y="330" width="22" height="18" rx="3" fill="white" stroke="#43a047"/>
  <text x="403" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="#43a047">3</text>

  <line x1="760" y1="310" x2="760" y2="415" stroke="#43a047" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="742" y="330" width="22" height="18" rx="3" fill="white" stroke="#43a047"/>
  <text x="753" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="#43a047">3</text>

  <!-- t arrows (fetch - dashed black downward) -->
  <line x1="120" y1="310" x2="120" y2="415" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlack)"/>
  <text x="108" y="375" font-size="12" font-weight="bold" fill="#333">t</text>

  <line x1="375" y1="310" x2="375" y2="415" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlack)"/>
  <text x="363" y="375" font-size="12" font-weight="bold" fill="#333">t</text>

  <line x1="725" y1="310" x2="725" y2="415" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlack)"/>
  <text x="713" y="375" font-size="12" font-weight="bold" fill="#333">t</text>

  <!-- t' arrows (mark complete - red upward) -->
  <line x1="190" y1="420" x2="190" y2="315" stroke="#e53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="195" y="375" font-size="12" font-weight="bold" fill="#e53935">t'</text>

  <line x1="445" y1="420" x2="445" y2="315" stroke="#e53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="450" y="375" font-size="12" font-weight="bold" fill="#e53935">t'</text>

  <line x1="795" y1="420" x2="795" y2="315" stroke="#e53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="800" y="375" font-size="12" font-weight="bold" fill="#e53935">t'</text>
</svg>
